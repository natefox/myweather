<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyWeather — Wind Forecast Comparison</title>
  <meta name="description" content="Compare wind forecasts from HRRR, GFS, ECMWF, ICON, and NAM models">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌊</text></svg>">
  <script>document.write('<link rel="stylesheet" href="style.css?v='+Math.floor(Date.now()/36e5)+'">')</script>
</head>
<body>
  <header class="header">
    <h1 class="header__title">MyWeather</h1>
    <div class="header__controls">
      <span id="location-display" class="location-display"></span>
      <button id="update-location-btn" class="update-location-btn" title="Update location">&#x1F4CD;</button>
      <span id="last-updated" class="last-updated"></span>
    </div>
  </header>

  <div class="view-toggle">
    <button id="btn-detailed" class="view-toggle__btn view-toggle__btn--active">Detailed</button>
    <button id="btn-summary" class="view-toggle__btn">Summary</button>
  </div>

  <div id="grid-container" class="grid-container">
    <div id="loading" class="loading">
      <div class="loading__scene">
        <div class="loading__surfer">🏄</div>
        <div class="loading__waves">
          <span>🌊</span><span>🌊</span><span>🌊</span><span>🌊</span><span>🌊</span><span>🌊</span><span>🌊</span><span>🌊</span>
        </div>
      </div>
      <p id="loading-text">Loading forecast data…</p>
    </div>
    <div id="error" class="error" hidden>
      <p>Couldn't fetch forecast data.</p>
      <button id="retry-btn" class="retry-btn">Retry</button>
    </div>
  </div>

  <script>
    var s=document.createElement('script');
    s.src='app.js?v='+Math.floor(Date.now()/36e5);
    document.body.appendChild(s);
  </script>
</body>
</html>
